services: 
  fa-jellyfin-sync-app:
    image: ghcr.io/cruzadera/fa-jellyfin-sync:latest
    restart: always
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://app:8085}
      - API_KEY=${WORKER_API_KEY}
      - POLL_INTERVAL=${POLL_INTERVAL:-60}
      - BATCH_SIZE=${BATCH_SIZE:-50}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - filmaffinity-scores
    networks:
      - default